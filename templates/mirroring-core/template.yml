# templates/mirroring-core/template.yml
include:
  - component: $CI_SERVER_FQDN/library/cicd/utils/toolkit@main

.mirroring:mirroring-core:shared:tbc_common: |
  function tbc_envsubst() {
    awk '
      BEGIN {
        count_replaced_lines = 0
        # ASCII codes
        for (i=0; i<=255; i++)
          char2code[sprintf("%c", i)] = i
      }
      # determine encoding (from env or from file extension)
      function encoding() {
        enc = ENVIRON["TBC_ENVSUBST_ENCODING"]
        if (enc != "")
          return enc
        if (match(FILENAME, /\.(json|yaml|yml)$/))
          return "jsonstr"
        return "raw"
      }
      # see: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/encodeURIComponent
      function uriencode(str) {
        len = length(str)
        enc = ""
        for (i=1; i<=len; i++) {
          c = substr(str, i, 1);
          if (index("abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.!~*'\''()", c))
            enc = enc c
          else
            enc = enc "%" sprintf("%02X", char2code[c])
        }
        return enc
      }
      /# *nosubst/ {
        print $0
        next
      }
      {
        orig_line = $0
        line = $0
        count_repl_in_line = 0
        # /!\ 3rd arg (match) not supported in BusyBox awk
        while (match(line, /[$%]\{([[:alnum:]_]+)\}/)) {
          expr_start = RSTART
          expr_len = RLENGTH
          # get var name
          var = substr(line, expr_start+2, expr_len-3)
          # get var value (from env)
          val = ENVIRON[var]
          # check variable is set
          if (val == "") {
            printf("[\033[1;93mWARN\033[0m] Environment variable \033[33;1m%s\033[0m is not set or empty\n", var) > "/dev/stderr"
          } else {
            enc = encoding()
            if (enc == "jsonstr") {
              gsub(/["\\]/, "\\\\&", val)
              gsub("\n", "\\n", val)
              gsub("\r", "\\r", val)
              gsub("\t", "\\t", val)
            } else if (enc == "uricomp") {
              val = uriencode(val)
            } else if (enc == "raw") {
            } else {
              printf("[\033[1;93mWARN\033[0m] Unsupported encoding \033[33;1m%s\033[0m: ignored\n", enc) > "/dev/stderr"
            }
          }
          # replace expression in line
          line = substr(line, 1, expr_start - 1) val substr(line, expr_start + expr_len)
          count_repl_in_line++
        }
        if (count_repl_in_line) {
          if (count_replaced_lines == 0)
            printf("[\033[1;94mINFO\033[0m] Variable expansion occurred in file \033[33;1m%s\033[0m:\n", FILENAME) > "/dev/stderr"
          count_replaced_lines++
          printf("> line %s: %s\n", NR, orig_line) > "/dev/stderr"
        }
        print line
      }
    ' "$@"
  }

.mirroring:mirroring-core:shared:netrc: |
  function configure_netrc() {
    # maybe install .netrc
    if [[ -f ".netrc" ]]; then
      log_info "--- \\e[32m.netrc\\e[0m file found: envsubst and install"
      tbc_envsubst .netrc > ~/.netrc
    else
      # Use CI job token to authenticate
      log_info "--- configure \\e[32m.netrc\\e[0m with CI job token"
      echo -e "machine ${CI_SERVER_HOST}\nlogin gitlab-ci-token\npassword ${CI_JOB_TOKEN}" >> ~/.netrc
    fi
    chmod 0600 ~/.netrc
  }
  configure_netrc

.mirroring:mirroring-core:shared:registries_auth: |
  function configure_registries_auth() {
    if [[ -f ".docker/config.json" ]]
    then
      log_info "--- \\e[32m.docker/config.json\\e[0m file found: envsubst and install"
      mkdir -p ~/.docker
      # special variable supported
      TBC_CI_REGISTRY_TOKEN=$(echo -n "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')
      export TBC_CI_REGISTRY_TOKEN 
      tbc_envsubst .docker/config.json > ~/.docker/config.json
    else
      log_info "--- \\e[32m.docker/config.json\\e[0m file not found: looking for TBC built images..."
      _image_vars=$(env | awk -F '=' "/^[A-Z]+_(SNAPSHOT|RELEASE)_IMAGE=/ {print \$1}" | sort | uniq)
      if [[ -z "$_image_vars" ]]
      then
        log_info "... no TBC image detected: leave unconfigured Docker authentication"
      else
        # init Docker config JSON
        _docker_cfg_json="{\"auths\":{"
        _registry_hosts=","
        for _image_var in $_image_vars
        do
          _image_url=$(eval echo "\$${_image_var}")
          _registry_host=$(echo "$_image_url" | cut -d/ -f1)
          if [[ "$_registry_host" ]]
          then
            log_info "... TBC image detected: \\e[33;1m${_image_var}\\e[0m=\\e[33;1m${_image_url}\\e[0m..."
            if expr "${_registry_hosts}" : ".*,${_registry_host},.*" >/dev/null
            then
              log_info "... host \\e[33;1m${_registry_host}\\e[0m already configured: skip"
            else
              log_info "... add host \\e[33;1m${_registry_host}\\e[0m authentication"
              _prefix=$(echo "$_image_var" | cut -d_ -f1)
              _kind=$(echo "$_image_var" | cut -d_ -f2)
              _specific_user=$(eval echo "\$${_prefix}_REGISTRY_\$${_kind}_USER")
              _default_user=$(eval echo "\$${_prefix}_REGISTRY_USER")
              _specific_password=$(eval echo "\$${_prefix}_REGISTRY_\$${_kind}_PASSWORD")
              _default_password=$(eval echo "\$${_prefix}_REGISTRY_PASSWORD")
              _authent_token=$(echo -n "${_specific_user:-${_default_user:-$CI_REGISTRY_USER}}:${_specific_password:-${_default_password:-$CI_REGISTRY_PASSWORD}}" | base64 | tr -d '\n')
              if [[ "$_registry_hosts" != "," ]]
              then
                _docker_cfg_json="${_docker_cfg_json},"
              fi
              _docker_cfg_json="${_docker_cfg_json}\"$_registry_host\":{\"auth\":\"$_authent_token\"}"
              _registry_hosts="$_registry_hosts$_registry_host,"
            fi
          fi
        done
        # end Docker config JSON
        _docker_cfg_json="${_docker_cfg_json}}}"
        mkdir -p ~/.docker
        echo "$_docker_cfg_json" > ~/.docker/config.json
      fi
    fi
  }
 
  configure_registries_auth

